name: Facebook Auto Poster v5.3 SEO Photo Mode
on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"
permissions:
  contents: write
concurrency:
  group: facebook-auto-poster
  cancel-in-progress: false
jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Validate secrets
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          FIXED_LINK: ${{ secrets.FIXED_LINK }}
        run: |
          test -n "$FB_PAGE_ID" || (echo "Missing FB_PAGE_ID" && exit 1)
          test -n "$FB_ACCESS_TOKEN" || (echo "Missing FB_ACCESS_TOKEN" && exit 1)
          test -n "$FIXED_LINK" || (echo "Missing FIXED_LINK" && exit 1)
      - name: Run poster
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          FIXED_LINK: ${{ secrets.FIXED_LINK }}
          GRAPH_API_VERSION: v25.0
          POSTS_PER_RUN: "1"
          POST_IMAGE: "true"
          DRY_RUN: "false"
          LAWFUL_CONTENT_ONLY: "true"
          SOURCE_DOMAINS: filehippo.com,filehorse.com,softpedia.com,sourceforge.net,uptodown.com
        run: python auto_poster.py
      - name: Save posting log
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posted_log.json logs/latest.log || true
          git diff --cached --quiet && exit 0
          git commit -m "Update Facebook posting log"
          git push
